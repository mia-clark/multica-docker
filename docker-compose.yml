# Multica 一键启动编排（使用预构建镜像，无需本地编译）
#
# 使用步骤：
#   1. cp .env.example .env
#   2. 编辑 .env，至少设置 JWT_SECRET
#   3. docker compose up -d
#
# 访问：
#   前端  → http://localhost:3000
#   后端  → http://localhost:8080

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: multica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multica}
      POSTGRES_DB: ${POSTGRES_DB:-multica}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - multica

  backend:
    image: ghcr.io/mia-clark/multica-server:${MULTICA_TAG:-latest}
    container_name: multica-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD:-multica}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 必须在 .env 中设置}
      PORT: "8080"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # 可选：Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # 可选：Resend 邮件
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # 可选：S3 / CloudFront 对象存储
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      CLOUDFRONT_URL: ${CLOUDFRONT_URL:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - uploads:/app/uploads
    networks:
      - multica

  web:
    image: ghcr.io/mia-clark/multica-web:${MULTICA_TAG:-latest}
    container_name: multica-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - multica

volumes:
  postgres_data:
  uploads:

networks:
  multica:
    driver: bridge
