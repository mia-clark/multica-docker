# Multica 一键启动编排（使用预构建镜像，无需本地编译）
#
# 使用步骤：
#   1. cp .env.example .env
#   2. 编辑 .env，至少设置 JWT_SECRET
#      按需把 BACKEND_IMAGE 切换为 multica-server-full 以启用内置 agent CLI
#   3. docker compose up -d
#
# 访问：
#   前端  → http://localhost:3000
#   后端  → http://localhost:8080
#
# 进入 backend 容器使用内置 CLI（需先切到 server-full 镜像）：
#   docker compose exec backend claude
#   docker compose exec backend codex
#   docker compose exec backend gemini
#   docker compose exec backend multica daemon start --foreground

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: multica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multica}
      POSTGRES_DB: ${POSTGRES_DB:-multica}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - multica

  backend:
    # 默认精简版；想要内置 agent CLI 能力，把 BACKEND_IMAGE 改为
    # ghcr.io/mia-clark/multica-server-full
    image: ${BACKEND_IMAGE:-ghcr.io/mia-clark/multica-server}:${MULTICA_TAG:-latest}
    container_name: multica-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD:-multica}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 必须在 .env 中设置}
      PORT: "8080"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Google OAuth（可选）
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Resend 邮件（可选）
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # S3 / CloudFront 对象存储（可选）
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      CLOUDFRONT_URL: ${CLOUDFRONT_URL:-}
      # Agent CLI API Keys（仅 server-full 镜像生效，可选；不填可通过交互式 login）
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - uploads:/app/uploads
      # Agent 凭据持久化（避免每次重启要重登录；对 server-full 镜像有用，精简版无害）
      - claude_config:/root/.claude
      - codex_config:/root/.codex
      - gemini_config:/root/.gemini
      - multica_config:/root/.multica
    networks:
      - multica

  web:
    image: ghcr.io/mia-clark/multica-web:${MULTICA_TAG:-latest}
    container_name: multica-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - multica

volumes:
  postgres_data:
  uploads:
  claude_config:
  codex_config:
  gemini_config:
  multica_config:

networks:
  multica:
    driver: bridge
