name: Build and Push Multica Images

on:
  push:
    branches: [main]
  schedule:
    # 每天 UTC 00:00 自动构建一次（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: '上游 multica-ai/multica 的分支、tag 或 commit（默认 main）'
        required: false
        default: 'main'

# 同分支连续 push 时，只保留最新一次构建，取消排队中的旧构建
concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  UPSTREAM_REPO: multica-ai/multica
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  # --------------------------------------------------------------
  # Stage 1: 计算本轮要构建的 ref / 上游 SHA / 小写 owner
  # --------------------------------------------------------------
  prepare:
    name: Prepare build context
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
      sha_short: ${{ steps.sha.outputs.short }}
      sha_full: ${{ steps.sha.outputs.full }}
      owner: ${{ steps.owner.outputs.name }}
      is_main: ${{ steps.ref.outputs.is_main }}
    steps:
      - name: 计算 ref
        id: ref
        run: |
          REF="${{ github.event.inputs.ref }}"
          if [ -z "$REF" ]; then REF="main"; fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          if [ "$REF" = "main" ]; then
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 读取上游 SHA
        id: sha
        run: |
          FULL_SHA=$(git ls-remote "https://github.com/${{ env.UPSTREAM_REPO }}" "${{ steps.ref.outputs.ref }}" | awk '{print $1}')
          if [ -z "$FULL_SHA" ]; then
            # 可能是 commit hash 直接传入的情况，尝试原样使用
            FULL_SHA="${{ steps.ref.outputs.ref }}"
          fi
          SHORT_SHA="${FULL_SHA:0:7}"
          echo "short=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "full=$FULL_SHA" >> "$GITHUB_OUTPUT"
          echo "上游 ref=${{ steps.ref.outputs.ref }}, SHA=$FULL_SHA"

      - name: 归一化 owner 为小写（GHCR 要求）
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------
  # Stage 2: 并行构建上游 server / web 两个镜像
  # --------------------------------------------------------------
  build-upstream:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            dockerfile: Dockerfile
            image: multica-server
          - name: web
            dockerfile: Dockerfile.web
            image: multica-web

    steps:
      - name: Checkout 上游仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 1

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像元数据与标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_main == 'true' }}
            type=raw,value=${{ needs.prepare.outputs.sha_short }}
            type=raw,value=${{ needs.prepare.outputs.ref }},enable=${{ needs.prepare.outputs.is_main == 'false' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.sha_full }}
            org.opencontainers.image.title=multica-${{ matrix.name }}
            org.opencontainers.image.description=Mirror build of ${{ env.UPSTREAM_REPO }} (${{ matrix.name }})

      - name: 构建并推送 ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.ref }}
            COMMIT=${{ needs.prepare.outputs.sha_full }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: 输出构建摘要
        run: |
          {
            echo "## ${{ matrix.name }} 构建完成"
            echo ""
            echo "- 上游 ref: \`${{ needs.prepare.outputs.ref }}\`"
            echo "- 上游 commit: \`${{ needs.prepare.outputs.sha_full }}\`"
            echo "- 镜像标签："
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------
  # Stage 3: 基于刚构建好的 multica-server 镜像复用 `multica` CLI 二进制，
  # 叠装 claude/codex/gemini 三大 agent CLI + runtime 启动脚本。
  # 产物：multica-runtime（data plane，跑 multica daemon 作为 server 的 worker）
  # --------------------------------------------------------------
  build-runtime:
    name: Build multica-runtime
    needs: [prepare, build-upstream]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 本仓库（拿 Dockerfile.runtime）
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像元数据与标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner }}/multica-runtime
          tags: |
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_main == 'true' }}
            type=raw,value=${{ needs.prepare.outputs.sha_short }}
            type=raw,value=${{ needs.prepare.outputs.ref }},enable=${{ needs.prepare.outputs.is_main == 'false' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.sha_full }}
            org.opencontainers.image.title=multica-runtime
            org.opencontainers.image.description=Multica daemon runtime with claude/codex/gemini CLIs (data plane for self-hosted multica-server)

      - name: 构建并推送 multica-runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MULTICA_SERVER_IMAGE=${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner }}/multica-server:${{ needs.prepare.outputs.sha_short }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,scope=runtime,mode=max

      - name: 输出构建摘要
        run: |
          {
            echo "## multica-runtime 构建完成"
            echo ""
            echo "- 基础镜像: \`multica-server:${{ needs.prepare.outputs.sha_short }}\`（仅复用 multica CLI 二进制）"
            echo "- 叠加能力: claude / codex / gemini + multica daemon runtime"
            echo "- 角色: data plane（接 server 任务，调用 agent CLI 执行）"
            echo "- 镜像标签："
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
